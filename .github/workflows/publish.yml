name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm turbo run build

      - name: Run tests
        run: pnpm turbo run test

      - name: Create package source archives
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          mkdir -p release-assets

          tar -czf "release-assets/fieldcraft-core-${TAG}.tar.gz" \
            -C packages/core src package.json tsconfig.json

          tar -czf "release-assets/fieldcraft-react-${TAG}.tar.gz" \
            -C packages/react src package.json tsconfig.json components.json

          tar -czf "release-assets/fieldcraft-postgres-${TAG}.tar.gz" \
            -C packages/adapters/postgres src package.json tsconfig.json

          tar -czf "release-assets/fieldcraft-supabase-${TAG}.tar.gz" \
            -C packages/adapters/supabase src package.json tsconfig.json

          tar -czf "release-assets/fieldcraft-webhook-${TAG}.tar.gz" \
            -C packages/adapters/webhook src package.json

          tar -czf "release-assets/fieldcraft-templates-free-${TAG}.tar.gz" \
            -C packages/templates-free src package.json tsconfig.json

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          generateReleaseNotes: true
          makeLatest: true
          artifacts: 'release-assets/*.tar.gz'
          artifactContentType: application/gzip

# Usage:
#   1. Publish packages to npm manually: cd packages/<pkg> && npm publish --access public
#   2. git tag v1.0.2 && git push origin v1.0.2
#   3. GitHub Actions builds, tests, creates release with per-package source archives
